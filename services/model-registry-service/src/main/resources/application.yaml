spring:
  application:
    name: model-registry-service
  datasource:
    url: ${MODEL_REGISTRY_DATABASE_URL:jdbc:postgresql://localhost:5432/autumn_wind}
    username: ${MODEL_REGISTRY_DATABASE_USERNAME:autumn_wind}
    password: ${MODEL_REGISTRY_DATABASE_PASSWORD}
  flyway:
    create-schemas: true
    default-schema: model_registry
    schemas: model_registry
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: model_registry
    open-in-view: false
  jackson:
    datatype:
      enum:
        fail-on-numbers-for-enums: true
    deserialization:
      accept-float-as-int: false
      fail-on-unknown-properties: true
    mapper:
      allow-coercion-of-scalars: false

server:
  port: ${MODEL_REGISTRY_SERVER_PORT:8083}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info

autumn-wind:
  model-registry:
    service-jwt:
      issuer: ${MODEL_REGISTRY_SERVICE_JWT_ISSUER:https://issuer.example}
      audience: ${MODEL_REGISTRY_SERVICE_JWT_AUDIENCE:model-registry-service}
      jwk-set-uri: ${MODEL_REGISTRY_SERVICE_JWT_JWK_SET_URI:https://issuer.example/.well-known/jwks.json}
      allowed-callers: ${MODEL_REGISTRY_SERVICE_JWT_ALLOWED_CALLERS:gateway-service,admin-service}
      maximum-lifetime: ${MODEL_REGISTRY_SERVICE_JWT_MAXIMUM_LIFETIME:PT5M}
    inference-jwt:
      issuer: ${MODEL_REGISTRY_INFERENCE_JWT_ISSUER}
      audience: ${MODEL_REGISTRY_INFERENCE_JWT_AUDIENCE:model-registry-service}
      jwk-set-uri: ${MODEL_REGISTRY_INFERENCE_JWT_JWK_SET_URI}
      allowed-callers: ${MODEL_REGISTRY_INFERENCE_JWT_ALLOWED_CALLERS:inference-gateway-service}
      maximum-lifetime: ${MODEL_REGISTRY_INFERENCE_JWT_MAXIMUM_LIFETIME:PT60S}
    secret-store:
      master-key-file: ${MODEL_REGISTRY_SECRET_STORE_MASTER_KEY_FILE}
      key-id: ${MODEL_REGISTRY_SECRET_STORE_KEY_ID:local-v1}
