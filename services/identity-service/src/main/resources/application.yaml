spring:
  application:
    name: identity-service
  datasource:
    url: ${IDENTITY_DATABASE_URL:jdbc:postgresql://localhost:5432/autumn_wind}
    username: ${IDENTITY_DATABASE_USERNAME:autumn_wind}
    password: ${IDENTITY_DATABASE_PASSWORD}
  flyway:
    create-schemas: true
    default-schema: identity
    schemas: identity
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: identity
    open-in-view: false
  jackson:
    deserialization:
      fail-on-unknown-properties: true

server:
  port: ${IDENTITY_SERVER_PORT:8081}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

autumn-wind:
  identity:
    service-jwt:
      issuer: ${IDENTITY_SERVICE_JWT_ISSUER}
      audience: ${IDENTITY_SERVICE_JWT_AUDIENCE:identity-service}
      jwk-set-uri: ${IDENTITY_SERVICE_JWT_JWK_SET_URI}
      allowed-callers: ${IDENTITY_SERVICE_JWT_ALLOWED_CALLERS:gateway-service}
      required-scope: ${IDENTITY_SERVICE_JWT_REQUIRED_SCOPE:identity.session.introspect}
      maximum-lifetime: ${IDENTITY_SERVICE_JWT_MAXIMUM_LIFETIME:PT5M}
