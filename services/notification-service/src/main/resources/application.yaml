spring:
  application:
    name: notification-service
  datasource:
    url: ${NOTIFICATION_DATABASE_URL:jdbc:postgresql://localhost:5432/autumn_wind}
    username: ${NOTIFICATION_DATABASE_USERNAME:autumn_wind}
    password: ${NOTIFICATION_DATABASE_PASSWORD}
  flyway:
    create-schemas: true
    default-schema: notification
    schemas: notification
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: notification
    open-in-view: false
  jackson:
    datatype:
      enum:
        fail-on-numbers-for-enums: true
    deserialization:
      accept-float-as-int: false
      fail-on-unknown-properties: true
    mapper:
      allow-coercion-of-scalars: false

server:
  port: ${NOTIFICATION_SERVER_PORT:8082}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

autumn-wind:
  notification:
    secret-store:
      master-key-file: ${NOTIFICATION_SECRET_STORE_MASTER_KEY_FILE}
      key-id: ${NOTIFICATION_SECRET_STORE_KEY_ID:local-v1}
    service-jwt:
      issuer: ${NOTIFICATION_SERVICE_JWT_ISSUER}
      audience: ${NOTIFICATION_SERVICE_JWT_AUDIENCE:notification-service}
      jwk-set-uri: ${NOTIFICATION_SERVICE_JWT_JWK_SET_URI}
      allowed-callers: ${NOTIFICATION_SERVICE_JWT_ALLOWED_CALLERS:gateway-service}
      maximum-lifetime: ${NOTIFICATION_SERVICE_JWT_MAXIMUM_LIFETIME:PT5M}
