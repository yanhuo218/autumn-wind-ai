spring:
  application:
    name: gateway-service
  codec:
    max-in-memory-size: 1MB
server:
  port: ${GATEWAY_SERVER_PORT:8080}
  shutdown: graceful
management:
  endpoints:
    web:
      exposure:
        include: health,info
autumn-wind:
  gateway:
    downstream:
      identity-base-url: ${GATEWAY_IDENTITY_BASE_URL}
      model-registry-base-url: ${GATEWAY_MODEL_REGISTRY_BASE_URL}
